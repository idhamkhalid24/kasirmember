<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky Hijab - Member VVIP</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #f59e0b;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #dc2626;
            --success: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            text-transform: uppercase;
        }

        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            line-height: 1.5;
            padding: 10px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .app-header {
            background: var(--primary);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }

        .app-header h1 {
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .app-header p {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: none;
        }

        .main-content { padding: 15px; }

        .nav-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 12px;
            background: #e2e8f0;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--accent);
        }

        .tab-btn.retur-active.active {
            background: var(--danger);
            color: white;
        }

        .form-section { margin-bottom: 20px; }

        .label-group {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label-group::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 12px;
        }

        .full-width { grid-column: span 2; }

        .input-box { display: flex; flex-direction: column; gap: 4px; position: relative; }

        label { font-size: 10px; font-weight: 800; color: #94a3b8; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 14px;
            font-weight: 700;
            outline: none;
            transition: all 0.2s;
            background: #fafafa;
        }

        input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); }

        /* Custom Suggestion List */
        .suggestion-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            z-index: 100;
            max-height: 150px;
            overflow-y: auto;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: none;
        }

        .suggestion-item {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }

        .suggestion-item:hover { background: #fffbeb; color: var(--accent); }

        .btn-action {
            grid-column: span 2;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 5px;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-sale { background: var(--primary); color: var(--accent); }
        .btn-retur { background: var(--danger); color: white; }

        .preview-box {
            grid-column: span 2;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            display: none;
            border: 1px dashed;
        }

        .preview-sale { background: #fffbeb; border-color: var(--accent); color: #b45309; }
        .preview-retur { background: #fee2e2; border-color: var(--danger); color: var(--danger); }

        .table-wrapper {
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }

        th {
            background: #f8fafc;
            padding: 10px;
            text-align: left;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 9px;
            border-bottom: 1px solid var(--border);
        }

        td { padding: 10px; border-bottom: 1px solid #f8fafc; vertical-align: middle; }

        .qty-edit {
            width: 45px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }

        .hide-col { display: none !important; }

        .btn-del {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .text-retur { color: var(--danger); font-weight: bold; }

        .summary-card {
            background: var(--primary);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .total-val {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent);
        }

        .btn-wa {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 15px;
        }

        .btn-secondary {
            background: #e2e8f0;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-clear {
            background: #fee2e2;
            color: var(--danger);
        }

        .hidden { display: none; }

        /* Custom Modal / Toast Sederhana */
        #customAlert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            display: none;
        }
    </style>
</head>
<body>

    <div id="customAlert">DATA BERHASIL DIHAPUS</div>

    <div class="app-container">
        <div class="app-header">
            <h1>ROCKY HIJAB</h1>
            <p>STRUK MEMBER VVIP</p>
        </div>

        <div class="main-content">
            <div class="nav-tabs">
                <button id="tabBelanja" class="tab-btn active" onclick="switchTab('sale')">🛒 BELANJA</button>
                <button id="tabRetur" class="tab-btn" onclick="switchTab('retur')">↩ RETUR</button>
            </div>

            <div class="form-section">
                <div id="formTitle" class="label-group">INPUT BARANG BARU</div>
                <div class="grid-inputs">
                    <div class="input-box full-width">
                        <label>NAMA BARANG</label>
                        <input type="text" id="itemName" placeholder="NAMA HIJAB..." autocomplete="off" oninput="handleNameInput(this)">
                        <!-- Pengganti datalist bawaan -->
                        <div id="suggestionBox" class="suggestion-list"></div>
                    </div>

                    <div class="input-box">
                        <label>KODE HARGA</label>
                        <input type="text" id="itemCode" placeholder="MISAL: N." oninput="this.value = this.value.toUpperCase(); showPreview()">
                    </div>

                    <div class="input-box">
                        <label>QTY</label>
                        <input type="number" id="itemQty" value="1" min="1" oninput="showPreview()">
                    </div>

                    <div id="pricePreview" class="preview-box">
                        <span id="prevVal">RP 0</span>
                    </div>

                    <button id="btnMain" class="btn-action btn-sale" onclick="addItem()">+ MASUKKAN KERANJANG</button>
                </div>
            </div>

            <div id="cartSection" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div class="label-group" style="margin:0">DAFTAR TRANSAKSI</div>
                    <div style="display:flex; gap: 6px;">
                        <button onclick="toggleHidden()" class="btn-secondary">
                            <span id="eyeBtn">🙈</span> KODE
                        </button>
                        <button onclick="clearAllData()" class="btn-secondary btn-clear">
                            🗑️ HAPUS SEMUA
                        </button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="cartTable">
                        <thead>
                            <tr>
                                <th>ITEM</th>
                                <th class="kode-col hide-col">KODE</th>
                                <th style="text-align:center">QTY</th>
                                <th>TOTAL</th>
                                <th style="text-align:center">HAPUS</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="summary-card">
                    <div id="summaryArea"></div>
                    <div class="total-row">
                        <span style="font-size: 10px; opacity: 0.7; letter-spacing: 1px;">SISA BAYAR</span>
                        <span class="total-val" id="grandTotal">RP 0</span>
                    </div>
                    <button class="btn-wa" onclick="shareWA()">
                        KIRIM STRUK WHATSAPP
                    </button>
                </div>
            </div>

            <div id="emptyState" style="text-align:center; padding:40px 0; color:#cbd5e1; font-size:12px;">
                <p>BELUM ADA BARANG DI KERANJANG.</p>
            </div>
        </div>
    </div>

    <script>
        const baseMap = { 'P': 1, 'I': 2, 'N': 3, 'T': 4, 'U': 5, 'S': 6, 'O': 7, 'R': 8, 'G': 9, 'A': 0 };

        let currentMode = 'sale';
        let cart = JSON.parse(localStorage.getItem('rocky_cart_v8')) || [];
        let savedNames = JSON.parse(localStorage.getItem('rocky_names_v8')) || [];
        let isKodeHidden = true;

        function showAlert(text) {
            const el = document.getElementById('customAlert');
            el.innerText = text;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }

        // Fungsi input nama dengan suggestion kustom
        function handleNameInput(input) {
            input.value = input.value.toUpperCase();
            const val = input.value.trim();
            const box = document.getElementById('suggestionBox');
            
            if (val.length > 0) {
                const filtered = savedNames.filter(name => name.includes(val)).sort();
                if (filtered.length > 0) {
                    box.innerHTML = "";
                    filtered.forEach(name => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = name;
                        div.onclick = () => {
                            input.value = name;
                            box.style.display = 'none';
                        };
                        box.appendChild(div);
                    });
                    box.style.display = 'block';
                } else {
                    box.style.display = 'none';
                }
            } else {
                box.style.display = 'none';
            }
        }

        // Tutup suggestion jika klik di luar
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'itemName') {
                document.getElementById('suggestionBox').style.display = 'none';
            }
        });

        function switchTab(mode) {
            currentMode = mode;
            const tabBelanja = document.getElementById('tabBelanja');
            const tabRetur = document.getElementById('tabRetur');
            const formTitle = document.getElementById('formTitle');
            const btnMain = document.getElementById('btnMain');

            if (mode === 'sale') {
                tabBelanja.classList.add('active');
                tabRetur.classList.remove('active', 'retur-active');
                formTitle.innerText = "INPUT BARANG BARU";
                btnMain.innerText = "+ MASUKKAN KERANJANG";
                btnMain.className = "btn-action btn-sale";
            } else {
                tabRetur.classList.add('active', 'retur-active');
                tabBelanja.classList.remove('active');
                formTitle.innerText = "INPUT BARANG RETUR";
                btnMain.innerText = "↩ MASUKKAN RETUR";
                btnMain.className = "btn-action btn-retur";
            }
            showPreview();
        }

        function calcPrice(kode) {
            const input = kode.toUpperCase().replace(/\s/g, '');
            if (!input) return 0;
            let totalModal = 0;
            let temp = input;
            
            const ratRegex = /\((P|I|N|T|U|S|O|R|G|A)\)/g;
            let m;
            while ((m = ratRegex.exec(input)) !== null) {
                totalModal += (m[1] === 'A' ? 100 : baseMap[m[1]] * 100);
                temp = temp.replace(m[0], '');
            }

            if (temp.length > 0) {
                if (temp.includes('.')) {
                    const parts = temp.split('.');
                    const puluhanCode = parts[0];
                    const satuanCode = parts[1];
                    
                    if (puluhanCode) totalModal += (puluhanCode === 'A' ? 10 : baseMap[puluhanCode] * 10);
                    if (satuanCode) {
                        for (let c of satuanCode) if (baseMap[c] !== undefined) totalModal += baseMap[c];
                    }
                } 
                else if (temp.length === 2) {
                    totalModal += (temp[0] === 'A' ? 10 : baseMap[temp[0]] * 10);
                    totalModal += baseMap[temp[1]];
                } 
                else {
                    for (let c of temp) if (baseMap[c] !== undefined) totalModal += baseMap[c];
                }
            }

            if (totalModal <= 0) return 0;

            let u = (totalModal <= 20) ? 5 : (totalModal <= 45) ? 8 : (totalModal <= 70) ? 10 : (totalModal <= 99) ? 15 : (totalModal <= 200) ? 20 : 25;
            return (totalModal + u) * 1000;
        }

        function showPreview() {
            const h = calcPrice(document.getElementById('itemCode').value);
            const q = parseInt(document.getElementById('itemQty').value) || 1;
            const b = document.getElementById('pricePreview');
            const total = h * q;
            
            if (h > 0) {
                b.style.display = 'block';
                const prefix = currentMode === 'retur' ? "- " : "";
                document.getElementById('prevVal').innerText = prefix + "RP " + total.toLocaleString('id-ID');
                b.className = currentMode === 'retur' ? 'preview-box preview-retur' : 'preview-box preview-sale';
            } else b.style.display = 'none';
        }

        function addItem() {
            const nameInput = document.getElementById('itemName');
            const codeInput = document.getElementById('itemCode');
            const qtyInput = document.getElementById('itemQty');
            const name = nameInput.value.trim().toUpperCase();
            const code = codeInput.value.trim().toUpperCase();
            const qty = parseInt(qtyInput.value) || 1;
            const priceUnit = calcPrice(code);
            
            if (!name || priceUnit === 0) return;

            if (!savedNames.includes(name)) {
                savedNames.push(name);
                localStorage.setItem('rocky_names_v8', JSON.stringify(savedNames));
            }
            
            cart.push({ 
                id: Date.now(), 
                name: currentMode === 'retur' ? name + " (RETUR)" : name, 
                code, 
                qty,
                priceUnit,
                subtotal: priceUnit * qty,
                type: currentMode
            });
            
            saveAndRender();
            nameInput.value = ""; codeInput.value = ""; qtyInput.value = "1";
            document.getElementById('pricePreview').style.display = 'none';
            document.getElementById('suggestionBox').style.display = 'none';
            nameInput.focus();
        }

        function updateQty(id, newQty) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx > -1) {
                const q = Math.max(1, parseInt(newQty) || 1);
                cart[idx].qty = q;
                cart[idx].subtotal = cart[idx].priceUnit * q;
                saveAndRender();
            }
        }

        function deleteItem(id) { cart = cart.filter(i => i.id !== id); saveAndRender(); }

        function clearAllData() {
            if (cart.length === 0) return;
            const confirmClear = confirm("APAKAH ANDA YAKIN INGIN MENGHAPUS SEMUA DATA TRANSAKSI?");
            if (confirmClear) {
                cart = [];
                saveAndRender();
                showAlert("KERANJANG BERHASIL DIKOSONGKAN");
            }
        }

        function toggleHidden() { isKodeHidden = !isKodeHidden; document.getElementById('eyeBtn').innerText = isKodeHidden ? "🙈" : "👁️"; renderTable(); }
        function saveAndRender() { localStorage.setItem('rocky_cart_v8', JSON.stringify(cart)); renderTable(); }

        function renderTable() {
            const tbody = document.querySelector('#cartTable tbody');
            const sec = document.getElementById('cartSection');
            const empty = document.getElementById('emptyState');
            const headKode = document.querySelector('.kode-col');
            const summaryArea = document.getElementById('summaryArea');
            
            tbody.innerHTML = ""; summaryArea.innerHTML = "";
            let totalSale = 0; let totalRetur = 0;

            if (cart.length === 0) { sec.classList.add('hidden'); empty.classList.remove('hidden'); return; }
            sec.classList.remove('hidden'); empty.classList.add('hidden');
            
            if (isKodeHidden) headKode.classList.add('hide-col');
            else headKode.classList.remove('hide-col');

            cart.forEach(item => {
                if(item.type === 'sale') totalSale += item.subtotal;
                else totalRetur += item.subtotal;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight:700; font-size:12px" class="${item.type === 'retur' ? 'text-retur' : ''}">${item.name}</div>
                        <div style="font-size:10px; opacity:0.6">@ Rp ${item.priceUnit.toLocaleString('id-ID')}</div>
                    </td>
                    <td class="kode-col ${isKodeHidden ? 'hide-col' : ''}" style="color:#94a3b8; font-size:10px;">${item.code}</td>
                    <td style="text-align:center;">
                        <input type="number" class="qty-edit" value="${item.qty}" onchange="updateQty(${item.id}, this.value)">
                    </td>
                    <td style="font-weight:800; color:${item.type === 'retur' ? 'var(--danger)' : 'var(--primary)'}">
                        ${item.type === 'retur' ? '-' : ''}RP ${item.subtotal.toLocaleString('id-ID')}
                    </td>
                    <td style="text-align:center"><button class="btn-del" onclick="deleteItem(${item.id})">×</button></td>
                `;
                tbody.appendChild(tr);
            });

            summaryArea.innerHTML = `
                <div class="summary-line"><span>TOTAL BELANJA</span><span>RP ${totalSale.toLocaleString('id-ID')}</span></div>
                ${totalRetur > 0 ? `<div class="summary-line" style="color:#fb7185; opacity:1;"><span>POTONGAN RETUR (-)</span><span>-RP ${totalRetur.toLocaleString('id-ID')}</span></div>` : ''}
            `;
            document.getElementById('grandTotal').innerText = "RP " + Math.max(0, totalSale - totalRetur).toLocaleString('id-ID');
        }

        function shareWA() {
            if (cart.length === 0) return;
            const now = new Date();
            const date = now.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
            const time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            
            let totalSale = 0, totalRetur = 0;
            
            let msg = `*ROCKY HIJAB*\n`;
            msg += `_STRUK MEMBER VVIP_\n`;
            msg += `------------------------------------------\n`;
            msg += `Tgl : ${date} (${time})\n`;
            msg += `------------------------------------------\n\n`;
            
            cart.filter(i => i.type === 'sale').forEach(item => {
                totalSale += item.subtotal;
                msg += `✅ *${item.name}*\n`;
                msg += `   ${item.qty} x Rp ${item.priceUnit.toLocaleString('id-ID')} = *Rp ${item.subtotal.toLocaleString('id-ID')}*\n\n`;
            });

            const returList = cart.filter(i => i.type === 'retur');
            if (returList.length > 0) {
                msg += `*RINCIAN RETUR*:\n`;
                msg += `------------------------------------------\n`;
                returList.forEach(item => {
                    totalRetur += item.subtotal;
                    msg += `❌ *${item.name}*\n`;
                    msg += `   ${item.qty} x Rp ${item.priceUnit.toLocaleString('id-ID')} = *-Rp ${item.subtotal.toLocaleString('id-ID')}*\n\n`;
                });
            }

            msg += `------------------------------------------\n`;
            msg += `*TOTAL BAYAR : RP ${(totalSale - totalRetur).toLocaleString('id-ID')}*\n`;
            msg += `------------------------------------------\n\n`;
            msg += `_Terima kasih telah berbelanja_`;

            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => { renderTable(); };
    </script>
</body>
</html>
